{% extends "base.html" %}
{% block content %}

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="login-wrap">

    <div class="card login-card">

        <!-- Logo -->
        <div class="brand-box">
            <div class="brand-icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>

            <h1>
                Welcome Back
            </h1>

            <p>
                Login to continue securely
            </p>
        </div>


        <!-- Login Form -->
        <form method="POST" class="login-form">

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input
                    type="email"
                    name="email"
                    placeholder="Email Address"
                    required
                >
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button class="btn full-btn">
                <i class="fa-solid fa-right-to-bracket"></i>
                Login
            </button>

        </form>


        <!-- Divider -->
        <div class="divider">
            <span>OR</span>
        </div>


        <!-- Google Login -->
        <a href="/login/google" class="google-link">

            <button class="google-btn">

                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107"
                    d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                    <path fill="#FF3D00"
                    d="M6.3 14.7l6.6 4.8C14.7 15.3 19 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                    <path fill="#4CAF50"
                    d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.1C29.2 35.2 26.7 36 24 36c-5.3 0-9.7-3.3-11.4-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
                    <path fill="#1976D2"
                    d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.2-3.4 5.7-6.2 7.4l6.2 5.1C39.9 36.5 44 30.8 44 24c0-1.3-.1-2.3-.4-3.5z"/>
                </svg>

                Continue with Google

            </button>

        </a>


        <!-- Footer -->
        <p class="register-text">
            No account?
            <a href="/register">
                Register
            </a>
        </p>

    </div>

</div>


<style>
.login-wrap{
    min-height:82vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:430px;
    padding:38px;
    animation:fadeUp .7s ease;
}

/* Brand */
.brand-box{
    text-align:center;
    margin-bottom:28px;
}

.brand-icon{
    width:72px;
    height:72px;
    margin:auto;
    border-radius:18px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#3b82f6,#6366f1);
    font-size:28px;
    box-shadow:0 14px 30px rgba(59,130,246,.25);
}

.brand-box h1{
    margin-top:18px;
    font-size:34px;
}

.brand-box p{
    margin-top:10px;
    color:#94a3b8;
    font-size:15px;
}

/* Inputs */
.input-box{
    position:relative;
    margin-bottom:14px;
}

.input-box i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    color:#64748b;
}

.input-box input{
    padding-left:42px;
}

/* Buttons */
.full-btn{
    width:100%;
    margin-top:6px;
}

.full-btn i{
    margin-right:8px;
}

.google-link{
    text-decoration:none;
}

.google-btn{
    width:100%;
    margin-top:18px;

    border:none;
    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    padding:13px 18px;
    border-radius:14px;

    background:#ffffff;
    color:#111827;

    font-weight:600;
    font-size:15px;
    transition:.25s;
}

.google-btn:hover{
    transform:translateY(-2px);
}

/* Divider */
.divider{
    text-align:center;
    margin-top:22px;
    position:relative;
}

.divider span{
    background:#0f172a;
    color:#64748b;
    padding:0 12px;
    font-size:13px;
    position:relative;
    z-index:2;
}

.divider:before{
    content:"";
    position:absolute;
    left:0;
    right:0;
    top:50%;
    height:1px;
    background:rgba(255,255,255,.07);
}

/* Footer */
.register-text{
    text-align:center;
    margin-top:24px;
    color:#94a3b8;
}

.register-text a{
    color:#60a5fa;
    text-decoration:none;
}

/* Animation */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

{% endblock %}
