<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeepFake Detector</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:
    radial-gradient(circle at top right,#1d4ed8 0%,transparent 25%),
    radial-gradient(circle at bottom left,#7c3aed 0%,transparent 25%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
    color:#fff;
    min-height:100vh;
}

/* ===================================== */
/* NAVBAR */
/* ===================================== */

.navbar{
    width:100%;
    padding:18px 34px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,.04);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,.06);

    position:sticky;
    top:0;
    z-index:999;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:22px;
    font-weight:700;
    letter-spacing:.4px;
}

.logo-icon{
    width:42px;
    height:42px;
    border-radius:14px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#3b82f6,#6366f1);
    box-shadow:0 10px 25px rgba(59,130,246,.35);
}

.nav-links{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.nav-links a{
    text-decoration:none;
    color:#cbd5e1;
    font-size:15px;
    padding:10px 14px;
    border-radius:12px;
    transition:.25s ease;
}

.nav-links a:hover{
    color:#fff;
    background:rgba(255,255,255,.06);
}

/* user badge */

.profile-badge{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 14px;
    border-radius:30px;

    background:rgba(59,130,246,.12);
    color:#93c5fd;
    font-size:14px;
    border:1px solid rgba(59,130,246,.18);
}

.profile-badge i{
    font-size:13px;
}

/* ===================================== */
/* CONTAINER */
/* ===================================== */

.container{
    width:100%;
    max-width:1240px;
    margin:auto;
    padding:42px 22px;
}

/* ===================================== */
/* CARD */
/* ===================================== */

.card{
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(16px);

    border-radius:24px;
    padding:32px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.32),
    inset 0 1px 0 rgba(255,255,255,.03);
}

/* ===================================== */
/* BUTTON */
/* ===================================== */

.btn{
    border:none;
    cursor:pointer;

    padding:13px 22px;
    border-radius:14px;

    color:white;
    font-weight:600;
    font-size:15px;

    background:linear-gradient(135deg,#3b82f6,#6366f1);

    transition:.25s ease;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 16px 30px rgba(59,130,246,.25);
}

.btn:active{
    transform:translateY(0);
}

/* ===================================== */
/* INPUT */
/* ===================================== */

input,
textarea,
select{
    width:100%;
    padding:14px 16px;

    border-radius:14px;
    border:1px solid rgba(255,255,255,.06);

    background:#0f172a;
    color:#fff;
    outline:none;

    margin:10px 0;
}

input:focus,
textarea:focus,
select:focus{
    border-color:#3b82f6;
    box-shadow:0 0 0 4px rgba(59,130,246,.12);
}

/* ===================================== */
/* GRID */
/* ===================================== */

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

/* ===================================== */
/* FOOTER */
/* ===================================== */

.footer{
    margin-top:60px;
    padding:28px 20px;
    text-align:center;
    color:#64748b;
    font-size:14px;
}

/* ===================================== */
/* MOBILE */
/* ===================================== */

@media(max-width:860px){

.navbar{
    padding:16px 18px;
    flex-direction:column;
    gap:14px;
}

.logo{
    font-size:20px;
}

.nav-links{
    justify-content:center;
}

.container{
    padding:28px 14px;
}

.card{
    padding:22px;
}

}

</style>
</head>


<body>

<!-- ===================================== -->
<!-- NAVBAR -->
<!-- ===================================== -->

<div class="navbar">

    <div class="logo">

        <div class="logo-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <span>DeepFake Detector</span>

    </div>


    <div class="nav-links">

        {% if session.get('user') %}

            <div class="profile-badge">
                <i class="fa-solid fa-user"></i>
                {{ session['user'] }}
            </div>

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Home
            </a>

            <a href="/profile">
                <i class="fa-solid fa-id-badge"></i>
                Profile
            </a>

            <a href="/logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </a>

        {% else %}

            <a href="/">
                <i class="fa-solid fa-house"></i>
                Home
            </a>

            <a href="/login">
                <i class="fa-solid fa-right-to-bracket"></i>
                Login
            </a>

            <a href="/register">
                <i class="fa-solid fa-user-plus"></i>
                Register
            </a>

        {% endif %}

    </div>

</div>


<!-- ===================================== -->
<!-- PAGE CONTENT -->
<!-- ===================================== -->

<div class="container">
{% block content %}{% endblock %}
</div>


<!-- ===================================== -->
<!-- FOOTER -->
<!-- ===================================== -->

<div class="footer">
    Detecting Deepfakes. Exposing Morphing. Protecting Trust.
</div>

</body>
</html>
