{% extends "base.html" %}

{% block content %}

<style>
.form-box {
    width: 380px;
    margin: auto;
    margin-top: 60px;
    padding: 30px;
    background: #1e293b;
    border-radius: 12px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

.form-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    outline: none;
}

.form-box button {
    width: 100%;
    padding: 12px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.form-box button:hover {
    background: #2563eb;
}

.link {
    text-align: center;
    margin-top: 10px;
}

.error {
    color: #ef4444;
    text-align: center;
}
</style>

<div class="form-box">

    <h2>Create Account</h2>

    <!-- 🔥 error message -->
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input type="email" name="email" placeholder="Enter Email" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <!-- 🔥 optional confirm password -->
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Register</button>

    </form>

    <div class="link">
        <p>Already have account? <a href="/login">Login</a></p>
    </div>

</div>

{% endblock %}
